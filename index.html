<!DOCTYPE html>
<html>
<head>
  <title>Schaakbot</title>
  <style>
    body { background:#111; color:white; text-align:center; font-family:Arial; }
    #board { font-size:40px; line-height:1.2; margin-top:30px; white-space:pre; }
    button { padding:12px 20px; font-size:18px; }
  </style>
</head>
<body>
  <h1>Onverslaanbare Schaakbot</h1>
  <p>Testversie zonder plaatjes</p>

  <button onclick="nieuwSpel()">Nieuw spel</button>
  <div id="board"></div>

  <script>
    function nieuwSpel() {
      document.getElementById("board").textContent =
`♜ ♞ ♝ ♛ ♚ ♝ ♞ ♜
♟ ♟ ♟ ♟ ♟ ♟ ♟ ♟
□ □ □ □ □ □ □ □
□ □ □ □ □ □ □ □
□ □ □ □ □ □ □ □
□ □ □ □ □ □ □ □
♙ ♙ ♙ ♙ ♙ ♙ ♙ ♙
♖ ♘ ♗ ♕ ♔ ♗ ♘ ♖`;
    }

    nieuwSpel();
  </script>
</body>
</html>
