<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schaakspel Pro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="board-wrap">
      <div id="board"></div>
    </section>

    <aside class="sidebar">
      <h1>Schaakspel Pro</h1>
      <p>Speel tegen Stockfish in je browser.</p>

      <div id="status">Wit is aan zet.</div>

      <label for="difficulty">Botniveau</label>
      <select id="difficulty">
        <option value="3">Beginner</option>
        <option value="6">Normaal</option>
        <option value="10">Sterk</option>
        <option value="15">Expert</option>
        <option value="20">Stockfish Max</option>
      </select>

      <button id="newGame">Nieuw spel</button>

      <h2>Zetten</h2>
      <div id="moves">Nog geen zetten.</div>
    </aside>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
